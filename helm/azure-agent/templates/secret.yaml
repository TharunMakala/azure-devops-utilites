{{- if not .Values.azureDevOps.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "azure-devops-agent.fullname" . }}-pat
  labels:
    {{- include "azure-devops-agent.labels" . | nindent 4 }}
type: Opaque
data:
  pat: {{ .Values.azureDevOps.pat | b64enc | quote }}
{{- end }}
