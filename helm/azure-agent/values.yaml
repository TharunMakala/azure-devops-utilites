replicaCount: 2

image:
  repository: azure-devops-agent
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

azureDevOps:
  orgUrl: ""
  pat: ""
  pool: "Default"
  existingSecret: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

resources:
  limits:
    cpu: "2"
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 50Gi

dockerInDocker:
  enabled: false
  resources:
    limits:
      cpu: "1"
      memory: 2Gi

podDisruptionBudget:
  enabled: true
  minAvailable: 1
