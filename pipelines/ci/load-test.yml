trigger: none

parameters:
  - name: environment
    type: string
    default: "staging"
    values: ["dev", "staging"]
  - name: testScript
    type: string
    default: "tests/load/baseline.js"
  - name: virtualUsers
    type: number
    default: 50
  - name: duration
    type: string
    default: "5m"
  - name: thresholds
    type: object
    default:
      http_req_duration_p95: 500
      http_req_failed_rate: 0.01
      http_req_duration_p99: 1000

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: "loadtest-${{ parameters.environment }}"

stages:
  - stage: LoadTest
    displayName: "Performance Test (${{ parameters.environment }})"
    jobs:
      - job: RunK6
        displayName: "k6 Load Test"
        timeoutInMinutes: 30
        steps:
          - script: |
              sudo gpg -k
              sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
              echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
              sudo apt-get update && sudo apt-get install -y k6
            displayName: "Install k6"

          - script: |
              cat > /tmp/k6-script.js << 'K6SCRIPT'
              import http from 'k6/http';
              import { check, sleep } from 'k6';
              import { Rate, Trend } from 'k6/metrics';

              const errorRate = new Rate('errors');
              const apiDuration = new Trend('api_duration');

              export const options = {
                stages: [
                  { duration: '1m', target: __ENV.VUS / 2 },
                  { duration: __ENV.DURATION, target: __ENV.VUS },
                  { duration: '1m', target: 0 },
                ],
                thresholds: {
                  http_req_duration: ['p(95)<' + __ENV.THRESHOLD_P95],
                  http_req_failed: ['rate<' + __ENV.THRESHOLD_FAIL_RATE],
                  errors: ['rate<0.1'],
                },
              };

              const BASE_URL = __ENV.TARGET_URL;

              export default function () {
                const endpoints = [
                  { path: '/api/health', method: 'GET' },
                  { path: '/api/projects', method: 'GET' },
                  { path: '/api/pipelines', method: 'GET' },
                ];

                const endpoint = endpoints[Math.floor(Math.random() * endpoints.length)];
                const url = `${BASE_URL}${endpoint.path}`;
                const params = {
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${__ENV.API_TOKEN}`,
                  },
                  timeout: '10s',
                };

                const res = http.get(url, params);
                apiDuration.add(res.timings.duration);

                const success = check(res, {
                  'status is 200': (r) => r.status === 200,
                  'response time < 500ms': (r) => r.timings.duration < 500,
                  'response has body': (r) => r.body && r.body.length > 0,
                });

                errorRate.add(!success);
                sleep(Math.random() * 3 + 1);
              }

              export function handleSummary(data) {
                return {
                  '/tmp/k6-summary.json': JSON.stringify(data),
                  stdout: textSummary(data, { indent: '  ', enableColors: true }),
                };
              }

              import { textSummary } from 'https://jslib.k6.io/k6-summary/0.0.3/index.js';
              K6SCRIPT
            displayName: "Generate k6 test script"

          - script: |
              k6 run /tmp/k6-script.js \
                --out json=/tmp/k6-results.json \
                -e TARGET_URL="$(targetUrl)" \
                -e API_TOKEN="$(apiToken)" \
                -e VUS="${{ parameters.virtualUsers }}" \
                -e DURATION="${{ parameters.duration }}" \
                -e THRESHOLD_P95="${{ parameters.thresholds.http_req_duration_p95 }}" \
                -e THRESHOLD_FAIL_RATE="${{ parameters.thresholds.http_req_failed_rate }}" \
                --summary-trend-stats="avg,min,med,max,p(90),p(95),p(99)" \
                2>&1 | tee /tmp/k6-output.txt
              
              EXIT_CODE=${PIPESTATUS[0]}
              
              # Parse results for Azure DevOps test reporting
              if [ -f /tmp/k6-summary.json ]; then
                python3 -c "
              import json, sys
              with open('/tmp/k6-summary.json') as f:
                  data = json.load(f)
              metrics = data.get('metrics', {})
              duration = metrics.get('http_req_duration', {}).get('values', {})
              print(f'##vso[task.setvariable variable=p95]{duration.get(\"p(95)\", 0):.0f}')
              print(f'##vso[task.setvariable variable=p99]{duration.get(\"p(99)\", 0):.0f}')
              print(f'##vso[task.setvariable variable=avgDuration]{duration.get(\"avg\", 0):.0f}')
              reqs = metrics.get('http_reqs', {}).get('values', {})
              print(f'##vso[task.setvariable variable=totalRequests]{reqs.get(\"count\", 0):.0f}')
              print(f'##vso[task.setvariable variable=rps]{reqs.get(\"rate\", 0):.1f}')
              "
              fi
              
              exit $EXIT_CODE
            displayName: "Run k6 load test"
            continueOnError: true

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: "/tmp/k6-results.json"
              artifactName: "load-test-results"
            condition: always()

          - script: |
              echo "## Load Test Results" >> $(Build.SourcesDirectory)/load-test-summary.md
              echo "" >> $(Build.SourcesDirectory)/load-test-summary.md
              echo "| Metric | Value |" >> $(Build.SourcesDirectory)/load-test-summary.md
              echo "|--------|-------|" >> $(Build.SourcesDirectory)/load-test-summary.md
              echo "| Total Requests | $(totalRequests) |" >> $(Build.SourcesDirectory)/load-test-summary.md
              echo "| Requests/sec | $(rps) |" >> $(Build.SourcesDirectory)/load-test-summary.md
              echo "| Avg Duration | $(avgDuration)ms |" >> $(Build.SourcesDirectory)/load-test-summary.md
              echo "| P95 Duration | $(p95)ms |" >> $(Build.SourcesDirectory)/load-test-summary.md
              echo "| P99 Duration | $(p99)ms |" >> $(Build.SourcesDirectory)/load-test-summary.md
            displayName: "Generate summary"
            condition: always()
